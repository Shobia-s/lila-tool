<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LILA BLACK — Player Journey Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0e;--panel:#0d1117;--border:#1e2530;--border2:#2a3444;--text:#c8d4e0;--dim:#5a6a7e;--accent:#e8333a;--accent2:#ff7b2f;--blue:#3a8fe8;--yellow:#f5c842;--purple:#9b59ff;--green:#2ecc71;--font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.ring{width:48px;height:48px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.lt{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:2px;}
#app{display:flex;flex-direction:column;height:100%;}
header{background:var(--panel);border-bottom:1px solid var(--border);padding:0 16px;height:44px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo{font-size:17px;font-weight:700;letter-spacing:3px;color:var(--accent);}
.hsub{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;}
.hbadge{background:#1a0a0b;border:1px solid #3a1215;color:var(--accent);padding:2px 8px;border-radius:2px;font-size:10px;letter-spacing:1px;}
.hstats{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim);}
.body-row{display:flex;flex:1;overflow:hidden;}
.sidebar{width:240px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);}
.ss{border-bottom:1px solid var(--border);padding:12px 14px;}
.st{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.field{margin-bottom:8px;}
.field label{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;}
select{width:100%;background:#0a0e14;border:1px solid var(--border2);color:var(--text);padding:6px 8px;border-radius:3px;font-size:12px;font-family:var(--font);cursor:pointer;outline:none;}
select:hover,select:focus{border-color:var(--accent);}
select option{background:#0d1117;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sbox{background:#0a0e14;border:1px solid var(--border);border-radius:3px;padding:7px 8px;}
.sbox .sv{font-family:var(--mono);font-size:18px;color:var(--accent2);line-height:1;}
.sbox .sk{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.sbox.bl .sv{color:var(--blue);}.sbox.gr .sv{color:var(--green);}.sbox.pu .sv{color:var(--purple);}
.lrow{display:flex;align-items:center;justify-content:space-between;padding:5px 0;cursor:pointer;}
.ll{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px;transition:color .15s;}
.ll.on{color:var(--text);}
.sw{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.tog{width:30px;height:15px;background:#1a2030;border:1px solid var(--border2);border-radius:8px;position:relative;cursor:pointer;transition:all .2s;flex-shrink:0;}
.tog.on{background:#2a0c0e;border-color:var(--accent);}
.tog::after{content:'';width:11px;height:11px;background:var(--dim);border-radius:50%;position:absolute;top:1px;left:1px;transition:all .2s;}
.tog.on::after{left:16px;background:var(--accent);}
.hmbtn{width:100%;padding:7px 10px;margin-top:6px;background:#0a0e14;border:1px solid var(--border2);color:var(--dim);font-family:var(--font);font-size:12px;letter-spacing:1px;cursor:pointer;border-radius:3px;text-transform:uppercase;transition:all .2s;}
.hmbtn:hover{border-color:var(--accent2);color:var(--accent2);}
.hmbtn.on{background:#1a0d00;border-color:var(--accent2);color:var(--accent2);}
.leg{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);padding:3px 0;}
.lic{font-size:13px;width:18px;text-align:center;}
.map-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#mapCont{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#05070a;}
#mapWrap{position:relative;display:none;}
#mapImg{display:block;max-width:100%;max-height:100%;}
#cv{position:absolute;top:0;left:0;pointer-events:none;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim);}
.empty .big{font-size:48px;opacity:.2;}
.empty p{font-size:13px;letter-spacing:1px;text-transform:uppercase;}
.tl{background:var(--panel);border-top:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;height:46px;}
.pbtn{background:var(--accent);border:none;color:white;padding:5px 14px;border-radius:2px;cursor:pointer;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:background .2s;white-space:nowrap;flex-shrink:0;}
.pbtn:hover{background:#ff4a50;}
.tdisp{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;flex-shrink:0;min-width:110px;}
input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--border2);border-radius:2px;cursor:pointer;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 6px var(--accent);}
.tlbl{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
</style>
</head>
<body>
<div id="loading">
  <div class="ring"></div>
  <div class="lt">LOADING LILA BLACK DATA</div>
  <div class="lt" style="font-size:10px;opacity:.5" id="lsub">reading telemetry...</div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="logo">LILA BLACK</div>
    <div class="hsub">Player Journey Visualization</div>
    <div class="hbadge">INTERNAL TOOL</div>
    <div class="hstats" id="hstats"></div>
  </header>
  <div class="body-row">
    <div class="sidebar">
      <div class="ss">
        <div class="st">Filters</div>
        <div class="field"><label>Map</label>
          <select id="selMap">
            <option value="">All Maps</option>
            <option value="AmbroseValley">Ambrose Valley</option>
            <option value="GrandRift">Grand Rift</option>
            <option value="Lockdown">Lockdown</option>
          </select>
        </div>
        <div class="field"><label>Date</label>
          <select id="selDate">
            <option value="">All Dates</option>
            <option value="February_10">Feb 10</option>
            <option value="February_11">Feb 11</option>
            <option value="February_12">Feb 12</option>
            <option value="February_13">Feb 13</option>
            <option value="February_14">Feb 14</option>
          </select>
        </div>
        <div class="field" style="margin-bottom:0"><label>Match</label>
          <select id="selMatch"><option value="">— Select a match —</option></select>
        </div>
      </div>
      <div class="ss" id="statsBox" style="display:none">
        <div class="st">Match Stats</div>
        <div class="sgrid" id="statGrid"></div>
      </div>
      <div class="ss">
        <div class="st">Layers</div>
        <div class="lrow" onclick="toggleLayer('humanPaths')"><span class="ll on" id="ll-humanPaths"><span class="sw" style="background:var(--blue)"></span>Human Paths</span><div class="tog on" id="tg-humanPaths"></div></div>
        <div class="lrow" onclick="toggleLayer('botPaths')"><span class="ll on" id="ll-botPaths"><span class="sw" style="background:#556"></span>Bot Paths</span><div class="tog on" id="tg-botPaths"></div></div>
        <div class="lrow" onclick="toggleLayer('kills')"><span class="ll on" id="ll-kills"><span class="sw" style="background:var(--accent)"></span>Kills</span><div class="tog on" id="tg-kills"></div></div>
        <div class="lrow" onclick="toggleLayer('deaths')"><span class="ll on" id="ll-deaths"><span class="sw" style="background:var(--accent2)"></span>Deaths</span><div class="tog on" id="tg-deaths"></div></div>
        <div class="lrow" onclick="toggleLayer('loot')"><span class="ll on" id="ll-loot"><span class="sw" style="background:var(--yellow)"></span>Loot</span><div class="tog on" id="tg-loot"></div></div>
        <div class="lrow" onclick="toggleLayer('storm')"><span class="ll on" id="ll-storm"><span class="sw" style="background:var(--purple)"></span>Storm Deaths</span><div class="tog on" id="tg-storm"></div></div>
        <button class="hmbtn" id="hmBtn" onclick="toggleHeat()">🔥 Heatmap Overlay</button>
      </div>
      <div class="ss">
        <div class="st">Legend</div>
        <div class="leg"><span class="lic" style="color:var(--accent)">✕</span>Kill</div>
        <div class="leg"><span class="lic">💀</span>Death</div>
        <div class="leg"><span class="lic" style="color:var(--yellow)">◆</span>Loot</div>
        <div class="leg"><span class="lic" style="color:var(--purple)">◉</span>Storm Death</div>
        <div class="leg"><span class="lic" style="color:var(--blue)">━</span>Human Path</div>
        <div class="leg"><span class="lic" style="color:#556">━</span>Bot Path</div>
      </div>
    </div>

    <div class="map-area">
      <div id="mapCont">
        <div class="empty" id="emptyMsg"><div class="big">🗺</div><p>Select a match to begin</p></div>
        <div id="mapWrap"><img id="mapImg" alt="minimap"/><canvas id="cv"></canvas></div>
      </div>
      <div class="tl">
        <button class="pbtn" id="playBtn" onclick="togglePlay()">▶ Play</button>
        <div class="tdisp" id="tdisp">0:00 / 0:00</div>
        <input type="range" id="slider" min="0" max="1000" value="1000" oninput="onSlider()">
        <div class="tlbl">Timeline</div>
      </div>
    </div>
  </div>
</div>

<script>
var allMatches=[],allEvents=[],allPositions=[];
var curEvents=[],curPositions=[];
var curMax=60000;
var layers={humanPaths:true,botPaths:true,kills:true,deaths:true,loot:true,storm:true};
var showHeat=false;
var playing=false,timer=null;

var cv=document.getElementById('cv');
var ctx=cv.getContext('2d');
var mapImg=document.getElementById('mapImg');
var slider=document.getElementById('slider');

async function init(){
  try{
    var res=await Promise.all([
      fetch('data/matches.json').then(function(r){return r.json();}),
      fetch('data/events.json').then(function(r){return r.json();}),
      fetch('data/positions.json').then(function(r){return r.json();})
    ]);
    allMatches=res[0]; allEvents=res[1]; allPositions=res[2];
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('hstats').textContent=allMatches.length+' MATCHES · '+allEvents.length+' EVENTS · FEB 10–14 2026';
    fillMatches();
  }catch(err){
    document.getElementById('lsub').textContent='⚠ Cannot load data/ folder. Check path.';
    console.error(err);
  }
}

function fillMatches(){
  var mapF=document.getElementById('selMap').value;
  var dateF=document.getElementById('selDate').value;
  var sel=document.getElementById('selMatch');
  var list=allMatches.filter(function(m){
    return (!mapF||m.map_id===mapF)&&(!dateF||m.day===dateF);
  });
  sel.innerHTML='<option value="">— '+list.length+' matches —</option>';
  list.forEach(function(m){
    var o=document.createElement('option');
    o.value=m.match_id_clean;
    o.textContent=m.map_id+' · '+m.day.replace('_',' ')+' · '+m.human_players+'H '+m.bot_players+'B';
    sel.appendChild(o);
  });
}
document.getElementById('selMap').addEventListener('change',fillMatches);
document.getElementById('selDate').addEventListener('change',fillMatches);
document.getElementById('selMatch').addEventListener('change',loadMatch);

function loadMatch(){
  var id=document.getElementById('selMatch').value;
  if(!id) return;
  stopPlay();

  var info=null;
  for(var i=0;i<allMatches.length;i++){if(allMatches[i].match_id_clean===id){info=allMatches[i];break;}}
  if(!info) return;

  curEvents=allEvents.filter(function(e){return e.match_id_clean===id;});
  curPositions=allPositions.filter(function(p){return p.match_id_clean===id;});

  // find min/max timestamp
  var tMin=Infinity,tMax=-Infinity;
  var all=curPositions.concat(curEvents);
  for(var i=0;i<all.length;i++){
    if(all[i].ts_ms<tMin) tMin=all[i].ts_ms;
    if(all[i].ts_ms>tMax) tMax=all[i].ts_ms;
  }
  if(!isFinite(tMin)){tMin=0;} if(!isFinite(tMax)){tMax=60000;}
  var offset=tMin;
  curPositions=curPositions.map(function(p){return Object.assign({},p,{ts_ms:p.ts_ms-offset});});
  curEvents=curEvents.map(function(e){return Object.assign({},e,{ts_ms:e.ts_ms-offset});});
  curMax=(tMax-tMin)||60000;

  slider.value=1000;
  showTime(curMax);

  // stats
  var kills=0,loots=0,storms=0;
  curEvents.forEach(function(e){
    if(e.event==='Kill'||e.event==='BotKill') kills++;
    if(e.event==='Loot') loots++;
    if(e.event==='KilledByStorm') storms++;
  });
  document.getElementById('statsBox').style.display='block';
  document.getElementById('statGrid').innerHTML=
    '<div class="sbox bl"><div class="sv">'+info.human_players+'</div><div class="sk">Humans</div></div>'+
    '<div class="sbox"><div class="sv">'+info.bot_players+'</div><div class="sk">Bots</div></div>'+
    '<div class="sbox"><div class="sv">'+kills+'</div><div class="sk">Kills</div></div>'+
    '<div class="sbox gr"><div class="sv">'+loots+'</div><div class="sk">Loots</div></div>'+
    '<div class="sbox pu" style="grid-column:1/-1"><div class="sv">'+storms+'</div><div class="sk">Storm Deaths</div></div>';

  document.getElementById('emptyMsg').style.display='none';
  document.getElementById('mapWrap').style.display='block';
  var MAPS={AmbroseValley:'minimaps/AmbroseValley_Minimap.png',GrandRift:'minimaps/GrandRift_Minimap.png',Lockdown:'minimaps/Lockdown_Minimap.jpg'};
  mapImg.onload=function(){resizeCv();draw();};
  mapImg.src=MAPS[info.map_id]||MAPS['AmbroseValley'];
}

function resizeCv(){
  var w=mapImg.offsetWidth||mapImg.naturalWidth||800;
  var h=mapImg.offsetHeight||mapImg.naturalHeight||800;
  cv.width=w; cv.height=h;
  cv.style.width=w+'px'; cv.style.height=h+'px';
}
window.addEventListener('resize',function(){if(mapImg.naturalWidth){resizeCv();draw();}});

function getT(){return (parseFloat(slider.value)/1000)*curMax;}

function draw(){
  if(!cv.width||!curMax) return;
  ctx.clearRect(0,0,cv.width,cv.height);
  var t=getT();
  var s=cv.width/1024;
  var fpos=curPositions.filter(function(p){return p.ts_ms<=t;});
  var fev=curEvents.filter(function(e){return e.ts_ms<=t;});
  if(showHeat) drawHeat(fev,fpos,s);
  drawPaths(fpos,s);
  fev.forEach(function(e){drawEv(e,s);});
}

function drawPaths(pos,s){
  var byUser={};
  pos.forEach(function(p){
    if(!byUser[p.user_id]) byUser[p.user_id]=[];
    byUser[p.user_id].push(p);
  });
  Object.keys(byUser).forEach(function(uid){
    var pts=byUser[uid];
    var bot=pts[0].is_bot;
    if(bot&&!layers.botPaths) return;
    if(!bot&&!layers.humanPaths) return;
    ctx.beginPath();
    ctx.strokeStyle=bot?'rgba(80,90,110,0.35)':'rgba(58,143,232,0.65)';
    ctx.lineWidth=bot?0.8:1.6;
    for(var i=0;i<pts.length;i++){
      if(i===0) ctx.moveTo(pts[i].px*s,pts[i].py*s);
      else ctx.lineTo(pts[i].px*s,pts[i].py*s);
    }
    ctx.stroke();
    if(!bot&&pts.length>0){
      ctx.beginPath();
      ctx.arc(pts[0].px*s,pts[0].py*s,3.5,0,Math.PI*2);
      ctx.fillStyle='rgba(58,143,232,0.9)';
      ctx.fill();
    }
  });
}

function drawEv(ev,s){
  var x=ev.px*s,y=ev.py*s,e=ev.event;
  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='middle';
  if((e==='Kill'||e==='BotKill')&&layers.kills){
    var r=e==='Kill'?7:5,c=e==='Kill'?'#e8333a':'#ff6060',lw=e==='Kill'?2.2:1.5;
    ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.shadowColor=c;ctx.shadowBlur=8;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x-r,y-r);ctx.lineTo(x+r,y+r);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+r,y-r);ctx.lineTo(x-r,y+r);ctx.stroke();
  }else if((e==='Killed'||e==='BotKilled')&&layers.deaths){
    ctx.font='13px Arial';ctx.shadowColor='#ff7b2f';ctx.shadowBlur=8;ctx.fillText('💀',x,y);
  }else if(e==='KilledByStorm'&&layers.storm){
    ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);
    ctx.strokeStyle='#9b59ff';ctx.lineWidth=1.5;ctx.shadowColor='#9b59ff';ctx.shadowBlur=10;ctx.stroke();
    ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle='#9b59ff';ctx.fill();
  }else if(e==='Loot'&&layers.loot){
    ctx.font='11px Arial';ctx.shadowColor='#f5c842';ctx.shadowBlur=6;ctx.fillStyle='#f5c842';ctx.fillText('◆',x,y);
  }
  ctx.restore();
}

function drawHeat(events,positions,s){
  var off=document.createElement('canvas');
  off.width=cv.width;off.height=cv.height;
  var oc=off.getContext('2d');
  events.filter(function(e){return e.event==='Kill'||e.event==='BotKill'||e.event==='Killed';}).forEach(function(p){
    var g=oc.createRadialGradient(p.px*s,p.py*s,0,p.px*s,p.py*s,28);
    g.addColorStop(0,'rgba(255,40,0,0.5)');g.addColorStop(1,'rgba(255,0,0,0)');
    oc.fillStyle=g;oc.fillRect(p.px*s-30,p.py*s-30,60,60);
  });
  var sample=positions.filter(function(_,i){return i%3===0;}).slice(0,2000);
  sample.forEach(function(p){
    var g=oc.createRadialGradient(p.px*s,p.py*s,0,p.px*s,p.py*s,12);
    g.addColorStop(0,'rgba(0,180,255,0.06)');g.addColorStop(1,'rgba(0,180,255,0)');
    oc.fillStyle=g;oc.fillRect(p.px*s-14,p.py*s-14,28,28);
  });
  ctx.globalAlpha=0.7;ctx.drawImage(off,0,0);ctx.globalAlpha=1;
}

function showTime(ms){
  document.getElementById('tdisp').textContent=fmt(ms)+' / '+fmt(curMax);
}
function fmt(ms){var s=Math.floor(ms/1000);return Math.floor(s/60)+':'+(''+(s%60)).padStart(2,'0');}

function onSlider(){showTime(getT());draw();}

function togglePlay(){playing?stopPlay():startPlay();}
function startPlay(){
  if(!curPositions.length&&!curEvents.length) return;
  playing=true;
  document.getElementById('playBtn').textContent='⏸ Pause';
  if(parseFloat(slider.value)>=999) slider.value=0;
  // 20 seconds total playback time
  var stepPerTick=1000/400; // 400 ticks × 50ms = 20 seconds
  timer=setInterval(function(){
    var v=parseFloat(slider.value)+stepPerTick;
    if(v>=1000){v=1000;slider.value=v;showTime(getT());draw();stopPlay();return;}
    slider.value=v;
    showTime(getT());
    draw();
  },50);
}
function stopPlay(){
  playing=false;clearInterval(timer);
  document.getElementById('playBtn').textContent='▶ Play';
}
function toggleLayer(name){
  layers[name]=!layers[name];
  document.getElementById('tg-'+name).classList.toggle('on',layers[name]);
  document.getElementById('ll-'+name).classList.toggle('on',layers[name]);
  draw();
}
function toggleHeat(){
  showHeat=!showHeat;
  document.getElementById('hmBtn').classList.toggle('on',showHeat);
  draw();
}

init();
</script>
</body>
</html>
